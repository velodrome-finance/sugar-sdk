[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Test output
addopts =
    -v
    --tb=short

# Timeout (10 minutes for RPC calls)
timeout = 600

# Ignore patterns
norecursedirs = .git .tox dist build *.egg _proc _docs node_modules env
